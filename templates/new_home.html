<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
body {
            background-color: #000000;
            color: #e7e9ea;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .feed-container {
            width: 100%;
            max-width: 600px;
            border-left: 1px solid #2f3336;
            border-right: 1px solid #2f3336;
            min-height: 100vh;
        }

        header {
            padding: 16px;
            backdrop-filter: blur(12px);
            background-color: rgba(0, 0, 0, 0.65);
            position: sticky;
            top: 0;
            border-bottom: 1px solid #2f3336;
            z-index: 10;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
        }

        /* Post/Note Styling */
        .note-card {
            padding: 12px 16px;
            border-bottom: 1px solid #2f3336;
            transition: background-color 0.2s;
            cursor: pointer;
            display: flex;
            gap: 12px;
        }

        .note-card:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        /* Placeholder for User Profile Pic */
        .avatar {
            width: 40px;
            height: 40px;
            background-color: #333639;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .note-content {
            flex-grow: 1;
        }

        .note-header {
            display: flex;
            gap: 4px;
            margin-bottom: 2px;
        }

        .note-title {
            color: #e7e9ea;
            font-weight: 700;
            margin: 0;
            font-size: 15px;
        }

        .note-text {
            margin: 4px 0 12px 0;
            line-height: 20px;
            font-size: 15px;
            white-space: pre-wrap;
        }

        /* Tags / Hashtags */
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .hashtag {
            color: #1d9bf0;
            text-decoration: none;
            font-size: 15px;
        }

        .hashtag:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="feed-container">
        <header>
            <h1>Notes</h1>
        </header>

        {% for note in notes %}
        <div class="note-card">
            <div class="avatar"></div>
            <div class="note-content">
                <div class="note-header">
                    <h2 class="note-title">{{note['title']}}</h2>
                </div>
                
                <p class="note-text">{{note['note']}}</p>

                <div class="tag-container">
                    {% if note['tags'] is not string %}
                        {% for tag in note['tags'] %}
                            <span class="hashtag">#{{tag}}</span>
                        {% endfor %}
                    {% else %}
                        <span class="hashtag">{{note['tags']}}</span>
                    {% endif %}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
